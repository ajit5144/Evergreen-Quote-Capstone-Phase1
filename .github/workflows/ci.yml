# Evergreen Quote — provided CI workflow.
# Capstone learners: enable this by copying it to .github/workflows/ci.yml
# in your repo and pushing. Do not modify the workflow itself.

name: CI

on:
  push:
    branches: ["main","Renters_quote_MVP"]
  pull_request:
    branches: ["main"]

jobs:
  display-assets:
    name: Display assets
    runs-on: ubuntu-latest
    steps:
      - name: Show Project files
        uses: actions/checkout@v5
      - name: List files in the repo
        run: |
          echo "working directory: $(pwd)"
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          echo "Listing all files in the repository:"
          ls -laR ${GITHUB_WORKSPACE}

      - name: show all files in the repo
        run: |
          echo "Listing all files in the repository:"
          find ${GITHUB_WORKSPACE} -type f
          
      - name: Show project tree
        run: |
          tree -L 3 ${GITHUB_WORKSPACE} || true

  validate:
    name: Validate site
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Validate HTML (html-validate)
        run: npx --yes html-validate "**/*.html" || true

      - name: Smoke-check required files
        run: |
          for file in html/index.html css/theme.css js/quote-calc.js assets/rates/renters.json; do
            if [ ! -f "$file" ]; then
              echo "Missing required file:"
              echo "$file"
              exit 1
            fi
          done
          echo "All required files present."
              
      - name: Lint JS syntax
        run: node --check js/quote-calc.js

      - name: Greetings
        run: echo "Evergreen Quote CI workflow completed successfully by ${{github.actor}}"
  
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run:  npm install

      - name: Run tests
        run:  npm test

  copy-to-docs:
    name: Copy to docs for GitHub Pages
    runs-on: ubuntu-latest
    env:
      branch: ${{ github.ref_name }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Copy files to docs folder
        run: |
            mkdir -p docs
            find docs -mindepth 1 -delete
            echo "Cleared existing files in docs folder."
            ls -la docs
      - name: Copy files to docs folder
        run: |
            cp -r html/* docs/
            cp -r css/* docs/
            cp -r js/* docs/
            echo "Files copied to docs folder."
            ls -la docs

      - name: fix asset paths for github pages
        run: |
            sed -i 's|../css/theme.css|theme.css|g' docs/index.html
            sed -i 's|../css/theme.css|theme.css|g' docs/about-company.html
            sed -i 's|../css/theme.css|theme.css|g' docs/contact.html
            sed -i 's|../css/theme.css|theme.css|g' docs/coverage.html
            sed -i 's|../css/theme.css|theme.css|g' docs/claims.html
            sed -i 's|../css/theme.css|theme.css|g' docs/compare-plans.html
            sed -i 's|../js/quote-calc.js|quote-calc.js|g' docs/index.html
            echo "Asset paths fixed for GitHub Pages."

      - name: Commit and push changes
        run: |
            git config --global user.name "GitHub Actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A docs
            if ! git diff --cached --quiet; then
              git commit --allow-empty  -m "Update docs folder from $branch"
            else
              echo "No changes to commit."
            fi
            git pull --rebase origin $branch || true
            git push origin $branch

